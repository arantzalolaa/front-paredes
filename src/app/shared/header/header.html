<mat-toolbar class="app-toolbar">
  <div class="brand-block">
    <span class="brand-title">Sistema</span>
    <span class="brand-subtitle">Bienvenido, {{ auth.currentUser()?.name || 'Usuario' }}</span>
  </div>

  <span class="spacer"></span>

  <button
    class="avatar"
    type="button"
    mat-icon-button
    [matMenuTriggerFor]="userMenu"
    aria-label="Abrir menú de usuario"
  >
    {{ auth.currentUser()?.name?.substring(0, 2)?.toUpperCase() || 'US' }}
  </button>

  <mat-menu #userMenu="matMenu">
    <div class="menu-user">
      <mat-icon>account_circle</mat-icon>
      <div class="menu-user-texts">
        <span class="menu-user-name">{{ auth.currentUser()?.name || 'Usuario actual' }}</span>
        <span class="menu-user-email">{{ auth.currentUser()?.email || 'Sin correo registrado' }}</span>
      </div>
    </div>

    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Cerrar sesión</span>
    </button>
  </mat-menu>
</mat-toolbar>
